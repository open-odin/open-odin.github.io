  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="8"/>
  <g>
    <circle cx="430" cy="300" r="145" fill="none" stroke="#7b9cff" stroke-opacity="0.22" stroke-width="3"/>
    <circle cx="725" cy="300" r="145" fill="none" stroke="#c59cff" stroke-opacity="0.24" stroke-width="3"/>
    <path d="M520 300C560 265 595 248 630 248C667 248 703 265 744 300" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
    <path d="M520 332C560 365 595 382 630 382C667 382 703 365 744 332" fill="none" stroke="#e8e8e8" stroke-opacity="0.14" stroke-width="3" stroke-linecap="round"/>
    <circle cx="430" cy="300" r="12" fill="#7b9cff" fill-opacity="0.55"/>
    <circle cx="725" cy="300" r="12" fill="#c59cff" fill-opacity="0.55"/>
  </g>
  <text x="110" y="540" fill="#e8e8e8" font-family="Georgia, serif" font-size="42" letter-spacing="1.2">What Makes an Apology Work</text>
</svg>
