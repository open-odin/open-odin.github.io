<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">What Makes an Apology Work</title>
  <desc id="desc">Abstract composition of two offset forms moving toward alignment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090909"/>
      <stop offset="100%" stop-color="#151019"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b9cff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c59cff" stop-opacity="0.45"/>
